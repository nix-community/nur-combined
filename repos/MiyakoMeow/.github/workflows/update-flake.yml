name: "Update flake.lock"
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "30 2 * * *" # daily at 02:30 UTC

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://miyakomeow.cachix.org/ https://nix-community.cachix.org/ https://cache.nixos.org/
            trusted-public-keys = miyakomeow.cachix.org-1:85k7pjjK1Voo+kMHJx8w3nT1rlBow3+4/M+LsAuMCRY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Update flake.lock
        run: nix flake update

      - name: Check for changes
        id: check-changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --state open \
            --json number,headRefName \
            -q '.[] | select(.headRefName | startswith("update/flake-")) | .number')

          if [ -n "$EXISTING_PR" ]; then
            echo "发现已存在的 PR #$EXISTING_PR"
            echo "has_existing_pr=true" >> $GITHUB_OUTPUT
            echo "existing_pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "has_existing_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate branch name
        id: gen-branch-name
        shell: bash
        run: |
          # 创建唯一分支名（可根据 group 优化命名，但此处保持兼容）
          timestamp=$(date +%s)
          printf '%s=%s\n' "branch_name" "update/flake-$timestamp" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check-changes.outputs.changed == 'true' && steps.check-pr.outputs.has_existing_pr != 'true'
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.gen-token.outputs.token }}
          commit-message: "flake.lock: update"
          title: "flake.lock: update"
          body: |
            由 GitHub Actions 自动更新 flake.lock
          branch: ${{ steps.gen-branch-name.outputs.branch_name }}
          labels: |
            automated
            dependencies
