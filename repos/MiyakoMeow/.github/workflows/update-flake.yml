name: "Update flake.lock"
on:
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "30 2 * * *" # daily at 02:30 UTC

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Parse substituters config
        id: subs
        shell: python
        run: |
          import tomllib, os
          with open("substituters.toml", "rb") as f:
              data = tomllib.load(f)
          subs = [s["url"] for s in data["substituters"] if ".cn/" not in s["url"]]
          keys = [s["public-key"] for s in data["substituters"] if "public-key" in s]
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"substituters={' '.join(subs)}\n")
              out.write(f"trusted-public-keys={' '.join(keys)}\n")

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = ${{ steps.subs.outputs.substituters }}
            trusted-public-keys = ${{ steps.subs.outputs.trusted-public-keys }}

      - name: Install required tools
        run: |
          nix profile install nixpkgs#gh

      - name: Update flake.lock
        run: |
          nix flake update

      - name: Generate branch name
        id: gen-branch-name
        shell: bash
        run: |
          # 创建唯一分支名（可根据 group 优化命名，但此处保持兼容）
          timestamp=$(date +%s)
          printf '%s=%s\n' "branch_name" "update-flake-$timestamp" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create Pull Request
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ steps.gen-token.outputs.token }}
          commit-message: "flake.lock: update"
          title: "flake.lock: update"
          body: |
            由 GitHub Actions 自动更新 flake.lock
          branch: ${{ steps.gen-branch-name.outputs.branch_name }}
          labels: |
            automated
            dependencies

      - name: Wait for CI completion
        if: steps.create-pull-request.outputs.pull-request-operation == 'created'
        run: |
          PR_NUMBER='${{ steps.create-pull-request.outputs.pull-request-number }}'
          scripts/actions/wait-for-actions.sh "$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Pull Request Automerge
        if: steps.create-pull-request.outputs.pull-request-operation == 'created'
        env:
          GITHUB_TOKEN: ${{ steps.gen-token.outputs.token }}
        run: |
          PR_NUMBER='${{ steps.create-pull-request.outputs.pull-request-number }}'
          echo "Enabling auto-merge for PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --auto --squash
