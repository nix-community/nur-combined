name: Update Packages via "updateScript"
on:
  schedule:
    - cron: "15 * * * *" # hourly at :15
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      package_list: ${{ steps.package-list.outputs.package_list }}
      package_count: ${{ steps.package-list.outputs.package_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://miyakomeow.cachix.org/ https://nix-community.cachix.org/ https://cache.nixos.org/
            trusted-public-keys = miyakomeow.cachix.org-1:85k7pjjK1Voo+kMHJx8w3nT1rlBow3+4/M+LsAuMCRY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Install dependencies
        run: |
          # 安装必要工具
          nix profile install nixpkgs#curl nixpkgs#jq nixpkgs#python3 nixpkgs#nix-update

      - name: Find packages with updateScript
        id: package-list
        shell: bash
        run: |
          bash scripts/update-packages/find-packages-with-update-script.sh

  update-package:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.prepare.outputs.package_list) }}
    outputs:
      pr_data: ${{ steps.create-pull-request.outputs.pr_data }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Generate branch name
        id: gen-branch-name
        shell: bash
        run: |
          append_github_output() {
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              printf '%s=%s\n' "$1" "$2" >> "$GITHUB_OUTPUT"
            else
              printf '%s=%s\n' "$1" "$2"
            fi
          }
          timestamp=$(date +%s)
          branch_name="update/${{ matrix.package }}-$timestamp-$GITHUB_RUN_ID"
          append_github_output "branch_name" "$branch_name"
          echo "分支名称: $branch_name"

      - name: Create update branch
        run: |
          git checkout -b "${{ steps.gen-branch-name.outputs.branch_name }}"

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://miyakomeow.cachix.org/ https://nix-community.cachix.org/ https://cache.nixos.org/
            trusted-public-keys = miyakomeow.cachix.org-1:85k7pjjK1Voo+kMHJx8w3nT1rlBow3+4/M+LsAuMCRY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Install required tools
        run: |
          nix profile install nixpkgs#python313 nixpkgs#python313Packages.requests nixpkgs#python313Packages.beautifulsoup4 nixpkgs#nix-update

      - name: Update package
        id: update
        shell: bash
        run: |
          bash scripts/update-packages/execute-update-script.sh "${{ matrix.package }}"

      - name: Check for file updates
        id: check-updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "发现文件更新"
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "没有文件更新"
          fi

      - name: Commit changes
        if: steps.check-updates.outputs.has_update == 'true'
        run: |
          git add -A
          git commit -m "${{ matrix.package }}: auto-update by updateScript"

      - name: Check for existing PR
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PACKAGE='${{ matrix.package }}'
          EXISTING_PR=$(gh pr list --state open \
            --json number,headRefName \
            -q '.[] | select(.headRefName | startswith("update/'$PACKAGE'-")) | .number')

          if [ -n "$EXISTING_PR" ]; then
            echo "发现已存在的 PR #$EXISTING_PR"
            echo "has_existing_pr=true" >> $GITHUB_OUTPUT
            echo "existing_pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "has_existing_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App Token
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.check-updates.outputs.has_update == 'true' && steps.check-pr.outputs.has_existing_pr != 'true'
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.gen-branch-name.outputs.branch_name }}
          title: "${{ matrix.package }}: auto-update by updateScript"
          body: |
            由GitHub Actions自动更新包 ${{ matrix.package }}

            此更新由包的updateScript自动生成
          labels: automated, dependencies
          token: ${{ steps.gen-token.outputs.token }}
