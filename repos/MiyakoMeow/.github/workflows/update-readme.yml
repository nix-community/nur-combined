name: Update README Package List

on:
  schedule:
    - cron: "0 * * * *" # hourly at :00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = https://miyakomeow.cachix.org/ https://nix-community.cachix.org/ https://cache.nixos.org/
            trusted-public-keys = miyakomeow.cachix.org-1:85k7pjjK1Voo+kMHJx8w3nT1rlBow3+4/M+LsAuMCRY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Install required tools
        run: |
          nix profile install nixpkgs#git nixpkgs#python3 nixpkgs#gh nixpkgs#jq

      - name: Update README
        id: update
        shell: bash
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          python3 scripts/readme.py

          timestamp=$(date +%s)
          branch_name="docs/update-readme-$timestamp"

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for existing PR
        id: check-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --state open \
            --json number,headRefName \
            -q '.[] | select(.headRefName | startswith("docs/update-readme-")) | .number')

          if [ -n "$EXISTING_PR" ]; then
            echo "发现已存在的 PR #$EXISTING_PR"
            echo "has_existing_pr=true" >> $GITHUB_OUTPUT
            echo "existing_pr_number=$EXISTING_PR" >> $GITHUB_OUTPUT
          else
            echo "has_existing_pr=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App Token
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.update.outputs.has_update == 'true' && steps.check-pr.outputs.has_existing_pr != 'true'
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.update.outputs.branch_name }}
          commit-message: "docs(readme): update package list"
          title: "README: Update package list"
          body: |
            由 GitHub Actions 自动更新 README 的 Package List
          labels: automated, documentation
          token: ${{ steps.gen-token.outputs.token }}
