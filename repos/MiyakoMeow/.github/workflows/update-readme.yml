name: Update README Package List

on:
  schedule:
    - cron: "0 * * * *" # hourly at :00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Parse substituters config
        id: subs
        shell: python
        run: |
          import tomllib, os
          with open("substituters.toml", "rb") as f:
              data = tomllib.load(f)
          subs = [s["url"] for s in data["substituters"] if ".cn/" not in s["url"]]
          keys = [s["public-key"] for s in data["substituters"] if "public-key" in s]
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"substituters={' '.join(subs)}\n")
              out.write(f"trusted-public-keys={' '.join(keys)}\n")

      - name: Setup Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = ${{ steps.subs.outputs.substituters }}
            trusted-public-keys = ${{ steps.subs.outputs.trusted-public-keys }}

      - name: Install required tools
        run: |
          nix profile install nixpkgs#git nixpkgs#python3 nixpkgs#gh nixpkgs#jq

      - name: Update README
        id: update
        shell: bash
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          python3 scripts/readme.py

          timestamp=$(date +%s)
          branch_name="docs/update-readme-$timestamp"

          if [ -n "$(git status --porcelain)" ]; then
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "branch_name=$branch_name" >> $GITHUB_OUTPUT
          else
            echo "has_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate GitHub App Token
        id: gen-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.HELPER_BOT_APP_ID }}
          private_key: ${{ secrets.HELPER_BOT_PRIVATE_KEY }}

      - name: Create Pull Request
        if: steps.update.outputs.has_update == 'true'
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.update.outputs.branch_name }}
          commit-message: "docs(readme): update package list"
          title: "README: Update package list"
          body: |
            由 GitHub Actions 自动更新 README 的 Package List
          labels: automated, documentation
          token: ${{ steps.gen-token.outputs.token }}

      - name: Wait for CI completion
        if: steps.create-pull-request.outputs.pull-request-operation == 'created'
        run: |
          PR_NUMBER='${{ steps.create-pull-request.outputs.pull-request-number }}'
          scripts/actions/wait-for-actions.sh "$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Pull Request Automerge
        if: steps.create-pull-request.outputs.pull-request-operation == 'created'
        run: |
          PR_NUMBER='${{ steps.create-pull-request.outputs.pull-request-number }}'
          echo "启用 PR #$PR_NUMBER 的自动合并"
          gh pr merge "$PR_NUMBER" --auto --squash
        env:
          GITHUB_TOKEN: ${{ steps.gen-token.outputs.token }}
