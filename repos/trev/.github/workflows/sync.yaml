name: sync

on:
  schedule:
    - cron: "0 12 * * *" # every day at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Compare revs
        run: |
          NUR_REV=$(curl -s "https://raw.githubusercontent.com/nix-community/NUR/refs/heads/main/repos.json.lock" | jq -r '.repos.trev.rev')
          echo "nur rev: ${NUR_REV}"

          GIT_REV=$(git rev-parse HEAD)
          echo "git rev: ${GIT_REV}"

          if [[ "${NUR_REV}" != "${GIT_REV}" ]]; then
            echo "nur rev does not match git rev"
            exit 1
          fi
