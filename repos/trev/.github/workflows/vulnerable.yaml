name: vulnerable

on:
  schedule:
    - cron: "0 9 * * 0" # every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: spotdemo4/nix-init@468df9f0e52570a28a9368f4eaee60a8d3847f66 # v1.39.0
        with:
          shell: vulnerable

      - name: Run flake-checker
        run: flake-checker -f

  actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: spotdemo4/nix-init@468df9f0e52570a28a9368f4eaee60a8d3847f66 # v1.39.0
        with:
          shell: vulnerable

      - name: Run octoscan
        run: octoscan scan .github
