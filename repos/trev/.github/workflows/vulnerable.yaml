name: vulnerable

on:
  schedule:
    - cron: "0 9 * * 0" # every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  flake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: spotdemo4/nix-init@86acbeccd17e66cd05f9dcd7bdc2be56292d9339 # v1.36.0
        with:
          shell: vulnerable

      - name: Run flake-checker
        run: flake-checker -f

  actions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: spotdemo4/nix-init@86acbeccd17e66cd05f9dcd7bdc2be56292d9339 # v1.36.0
        with:
          shell: vulnerable

      - name: Run octoscan
        run: octoscan scan .github
