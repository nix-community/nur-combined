name: vulnerable

on:
  schedule:
    - cron: "0 9 * * 0" # every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: spotdemo4/nix-init@025b28908ac14ff0cc0406998cdde4e3872c14bd # v1.50.0
        with:
          shell: vulnerable

      - name: Run flake-checker
        run: flake-checker -f

  actions:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: spotdemo4/nix-init@025b28908ac14ff0cc0406998cdde4e3872c14bd # v1.50.0
        with:
          shell: vulnerable

      - name: Run zizmor
        run: zizmor .github
