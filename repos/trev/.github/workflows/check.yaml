name: checks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        image:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
      fail-fast: false
    runs-on: ${{ matrix.image }}
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@1443d93dfa3ca2f043b37f848631d6ac5563b0ec # v1.56.0

      - name: Check flake
        run: nix flake check --max-jobs 1

      - name: Check evaluation
        run: |
          nix-env -f . -qa \* --meta --json \
            --allowed-uris https://static.rust-lang.org \
            --option restrict-eval true \
            --option allow-import-from-derivation true \
            --drv-path --show-trace \
            -I "$PWD"

  build:
    needs: check
    strategy:
      matrix:
        nix:
          - nixpkgs-unstable.tar.gz
          - nixos-unstable.tar.gz
        image:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
      fail-fast: false
    runs-on: ${{ matrix.image }}
    permissions:
      id-token: write
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@1443d93dfa3ca2f043b37f848631d6ac5563b0ec # v1.56.0
        with:
          shell: check

      - name: Build packages
        run: |
          nix-fast-build \
            --skip-cached \
            --no-nom \
            --override-input nixpkgs "https://github.com/NixOS/nixpkgs/archive/refs/heads/${{ matrix.nix }}" \
            --flake ".#packages.$(nix eval --raw --impure --expr builtins.currentSystem)"

  fix:
    needs: check
    if: >-
      failure() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          fetch_depth: 0

      - uses: spotdemo4/codex-action@8050fe759356d42cc15ab1ed988c24fb4ebd6769 # v0.1.0
        with:
          auth: ${{ secrets.CODEX_ACTION_AUTH }}
          client-id: ${{ vars.CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          prompt: .github/prompts/fix.md

  trigger:
    needs: [check, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NUR update
        run: curl -XPOST "https://nur-update.nix-community.org/update?repo=trev"
