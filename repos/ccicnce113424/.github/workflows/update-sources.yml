name: Update Sources

on:
  # push:
  #   branches:
  #     - main
  workflow_dispatch: # allows manual triggering
  schedule:
    - cron: "0 6 * * *"
      timezone: "Asia/Shanghai"

concurrency:
  group: update-sources
  cancel-in-progress: true

jobs:
  update-sources:
    runs-on: ubuntu-latest
    name: Update Sources
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            accept-flake-config = true

      - name: Update flake inputs and sources
        run: |
          nix flake update
          export NIX_PATH="nixpkgs=$(nix eval --raw .#nixpkgs)"
          nix run .#nvfetcher-bin
          git add .

      - name: Copy files from nixpkgs
        run: |
          NIXPKGS_PATH_IN_FLAKE_INPUTS=$(nix build --no-link --print-out-paths --file ./default.nix inputs.nixpkgs.outPath)
          echo "nixpkgs path: $NIXPKGS_PATH_IN_FLAKE_INPUTS"
          # Add copy commands here, e.g.:
          # cp "$NIXPKGS_PATH_IN_FLAKE_INPUTS/some/file" ./target/path/
          cp "$NIXPKGS_PATH_IN_FLAKE_INPUTS/pkgs/by-name/sp/splayer/package.nix" ./pkgs/splayer-git

      - name: Run update scripts
        run: |
          pkgs/daed/update.sh
          pkgs/kanzi-cpp/update.sh
          pkgs/kikoflu/update.sh
          pkgs/loveiwara/update.sh
          # pkgs/lumine/update.sh
          # pkgs/motrix-next/update.sh
          pkgs/motrix-next/update-beta.sh
          pkgs/piliplus/update.sh
          pkgs/pixes/update.sh
          pkgs/pixes/update-git.sh
          pkgs/splayer-git/update.sh
          pkgs/splayer-next-dev/update.sh
          pkgs/wild-reader/update.sh

      - name: Create Pull Request
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          commit-message: Update sources
          branch: ci/update-sources
          delete-branch: true
          title: Update sources
          labels: dependencies
