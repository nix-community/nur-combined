name: "Update packages"
on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9:00 UTC
  workflow_dispatch:

jobs:
  update-pkg:
    name: update-${{ matrix.package }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - ccpocket-bridge
          - ccusage
          - gogcli
          - kagiana
          - roots
          - git-wt
          - givy
          - mo
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixpkgs-unstable.tar.gz
        extra_nix_config: |
          experimental-features = nix-command flakes

    - name: Capture current version
      id: before
      run: |
        VERSION=$(grep 'version = ' pkgs/${{ matrix.package }}/default.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Run nix-update
      env:
        NIXPKGS_ALLOW_UNFREE: "1"
      run: |
        nix shell nixpkgs#nix-update -c \
          nix-update --build -f ./default.nix ${{ matrix.package }}

    - name: Detect changes
      id: after
      run: |
        if git diff --quiet pkgs/${{ matrix.package }}/; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          VERSION=$(grep 'version = ' pkgs/${{ matrix.package }}/default.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        fi

    - name: Create Pull Request
      if: steps.after.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        branch: update/${{ matrix.package }}-${{ steps.after.outputs.version }}
        commit-message: "${{ matrix.package }}: ${{ steps.before.outputs.version }} -> ${{ steps.after.outputs.version }}"
        title: "${{ matrix.package }}: ${{ steps.before.outputs.version }} -> ${{ steps.after.outputs.version }}"
        body: |
          Automated update of ${{ matrix.package }} from `${{ steps.before.outputs.version }}` to `${{ steps.after.outputs.version }}`.

          Generated by `nix-update` (`passthru.updateScript`).
        labels: automated

  update-oneaws:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixpkgs-unstable.tar.gz
        extra_nix_config: |
          experimental-features = nix-command flakes

    - name: Get current oneaws version
      id: before
      run: |
        VERSION=$(grep -A1 'oneaws = {' pkgs/oneaws/gemset.nix | grep version | sed 's/.*"\(.*\)".*/\1/' || true)
        # Fallback: parse from Gemfile.lock
        if [ -z "$VERSION" ]; then
          VERSION=$(grep '    oneaws ' pkgs/oneaws/Gemfile.lock | awk '{print $2}' | tr -d '()')
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Update oneaws gems
      run: |
        cd pkgs/oneaws
        nix shell nixpkgs#bundler nixpkgs#bundix -c bash -c '
          bundle update
          bundix
        '

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet pkgs/oneaws/; then
          echo "needs_update=false" >> "$GITHUB_OUTPUT"
        else
          echo "needs_update=true" >> "$GITHUB_OUTPUT"
          VERSION=$(grep '    oneaws ' pkgs/oneaws/Gemfile.lock | awk '{print $2}' | tr -d '()')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.before.outputs.version }}" != "$VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi
        fi

    - name: Create Pull Request (version update)
      if: steps.check.outputs.needs_update == 'true' && steps.check.outputs.version_changed == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        branch: update/oneaws-${{ steps.check.outputs.version }}
        commit-message: "oneaws: ${{ steps.before.outputs.version }} -> ${{ steps.check.outputs.version }}"
        title: "oneaws: ${{ steps.before.outputs.version }} -> ${{ steps.check.outputs.version }}"
        body: |
          Automated update of oneaws from `${{ steps.before.outputs.version }}` to `${{ steps.check.outputs.version }}`.

          Release: https://github.com/pepabo/oneaws/releases/tag/v${{ steps.check.outputs.version }}
        labels: automated

    - name: Create Pull Request (dependency update)
      if: steps.check.outputs.needs_update == 'true' && steps.check.outputs.version_changed == 'false'
      uses: peter-evans/create-pull-request@v8
      with:
        branch: update/oneaws-deps
        commit-message: "oneaws: update dependencies"
        title: "oneaws: update dependencies"
        body: |
          Automated dependency update for oneaws (version unchanged at `${{ steps.check.outputs.version }}`).
        labels: automated
