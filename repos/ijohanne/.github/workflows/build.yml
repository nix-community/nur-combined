name: "Build and populate cache"
on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron:  '42 5 * * *'
jobs:
  tests:
    strategy:
      matrix:
        nurRepo:
          - ijohanne
        nixPath:
          - nixpkgs=channel:nixos-unstable
          - nixpkgs=channel:nixpkgs-unstable
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: "${{ matrix.nixPath }}"
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
          extra-substituters = https://nix-cache.unixpimps.net/ijohanne
          extra-trusted-public-keys = ijohanne:55EJTBFbq5pCYx2tf+aR8pmVPvCmP7QlafHH90/kikw=
    - name: Show nixpkgs version
      run: nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'
    - name: Login to Attic
      if: github.event_name != 'pull_request'
      run: nix shell nixpkgs#attic-client -c attic login ci https://nix-cache.unixpimps.net/ "${{ secrets.ATTIC_TOKEN }}"
    - name: Build nix packages
      run: nix shell nixpkgs#nix-build-uncached -c nix-build-uncached ci.nix -A cacheOutputs
    - name: Push build outputs to Attic
      if: github.event_name != 'pull_request'
      run: nix shell nixpkgs#attic-client -c bash -lc 'set -o pipefail; nix-build ci.nix -A cacheOutputs --no-out-link | attic push ci:ijohanne --stdin'
    - name: Trigger NUR update
      if: ${{ matrix.nurRepo != '<YOUR_REPO_NAME>' }}
      run: curl -XPOST "https://nur-update.nix-community.org/update?repo=${{ matrix.nurRepo }}"
