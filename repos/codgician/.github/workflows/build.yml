name: build
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [build]
permissions:
  contents: read
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true
jobs:
  atelier:
    permissions:
      contents: read
      checks: write
      # Atelier's nested workflow declares OIDC for optional cache pushes.
      id-token: write
    uses: stepbrobd/atelier/.github/workflows/discover.yaml@6cf255b6e35733e746ef42208389159912ecbde2 # 2026.629.2
  harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Validate automation
        run: |
          nix fmt -- --ci .github flake.nix
          nix develop .# -c actionlint
          nix develop .# -c zizmor .github/workflows
          nix develop .# -c shellcheck .github/scripts/*.sh
          nix develop .# -c .github/scripts/automation_guards.test.sh
          nix develop .# -c check-jsonschema \
            --schemafile https://json.schemastore.org/github-issue-forms.json \
            .github/ISSUE_TEMPLATE/new-package.yml
  nur:
    needs: atelier
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NUR update
        continue-on-error: true
        run: |
          curl --fail --silent --show-error \
            --retry 5 --retry-all-errors --retry-delay 5 --retry-max-time 120 \
            --request POST "https://nur-update.nix-community.org/update?repo=codgician"
