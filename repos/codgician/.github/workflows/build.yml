name: build

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [build]

permissions:
  contents: read
  checks: write
  # atelier's nested build workflow unconditionally declares id-token: write
  # (for niks3 OIDC cache push). A caller must grant it or GitHub fails the
  # reusable-workflow graph at startup, even when no cache push is configured.
  id-token: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  atelier:
    uses: stepbrobd/atelier/.github/workflows/discover.yaml@2026.629.2

  nur:
    needs: atelier
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger NUR update
        run: curl -XPOST "https://nur-update.nix-community.org/update?repo=codgician"
