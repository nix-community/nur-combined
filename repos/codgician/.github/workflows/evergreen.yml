name: evergreen
on:
  schedule:
    - cron: "35 8 * * *"
  workflow_dispatch:
permissions: {}
concurrency:
  group: evergreen
  cancel-in-progress: false
jobs:
  flake:
    if: >-
      github.repository_id == '852828187' && github.actor == 'codgician' && github.actor_id == '15964984' && github.triggering_actor == 'codgician'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
      base_sha: ${{ steps.packages.outputs.base_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Find upgradable packages
        id: packages
        run: |
          packages=$(nix eval .#lib.packagesWithUpdateScript --raw --apply "x: builtins.toJSON (builtins.attrNames x)")
          echo "packages=$packages" >> "$GITHUB_OUTPUT"
          echo "base_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Update Nix flake
        run: nix flake update >> "$GITHUB_STEP_SUMMARY"
      - name: Generate publisher token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Create flake update pull request
        id: pull_request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: main
          branch: bot/flake-lock
          delete-branch: true
          add-paths: flake.lock
          commit-message: "flake.lock: update inputs"
          committer: galactic-batter[bot] <304539431+galactic-batter[bot]@users.noreply.github.com>
          author: galactic-batter[bot] <304539431+galactic-batter[bot]@users.noreply.github.com>
          sign-commits: true
          title: "flake.lock: update inputs"
          body: |
            Automated update of the flake inputs.

            - Origin: `nix flake update`
            - Validation: required pull-request CI before merge
          labels: |
            bot
            bot-deterministic
            dependencies
      - name: Enable flake auto-merge
        if: steps.pull_request.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pull_request.outputs.pull-request-number }}
          REPOSITORY: ${{ github.repository }}
        run: gh pr merge --repo "$REPOSITORY" --auto --squash "$PR_NUMBER"
  prepare-package:
    name: prepare (${{ matrix.package }})
    needs: flake
    if: ${{ needs.flake.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.flake.outputs.packages) }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read
    env:
      PACKAGE: ${{ matrix.package }}
    steps:
      - name: Checkout trusted revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.flake.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Validate package name
        run: |
          if [[ ! "$PACKAGE" =~ ^[a-z][a-z0-9_-]{0,63}$ ]]; then
            echo "Invalid package attribute: $PACKAGE" >&2
            exit 1
          fi
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Record baseline
        run: |
          nix eval --raw ".#$PACKAGE.version" > "$RUNNER_TEMP/old-version"
          if ! nix eval --raw ".#$PACKAGE.meta.mainProgram" > "$RUNNER_TEMP/main-program" 2>/dev/null; then
            printf 'none' > "$RUNNER_TEMP/main-program"
          fi
          mkdir -p .ai-state
          printf '\n.ai-state/\n' >> .git/info/exclude
      - name: Run updater
        id: updater
        run: |
          set +e
          nix develop .# -c .github/scripts/run_updater.sh "$PACKAGE" \
            > .ai-state/updater.log 2>&1
          exit_code=$?
          set -e

          while IFS= read -r -d '' log; do
            if [[ -f "$log" && ! -L "$log" && $(stat -c '%s' "$log") -le 16777216 ]]; then
              cp "$log" ".ai-state/$(basename "$log")"
            fi
            rm -f -- "$log"
          done < <(git ls-files --others --exclude-standard -z -- ':(top,glob)*.log')

          outside=$(git status --porcelain --untracked-files=all -- . ":(exclude)pkgs/$PACKAGE/**")
          if [[ -n "$outside" ]]; then
            echo "Updater changed files outside pkgs/$PACKAGE:" >&2
            printf '%s\n' "$outside" >&2
            exit 1
          fi
          if [[ -n "$(git status --porcelain --untracked-files=all -- "pkgs/$PACKAGE")" ]]; then
            package_changes=true
          else
            package_changes=false
          fi
          {
            echo "exit_code=$exit_code"
            echo "package_changes=$package_changes"
          } >> "$GITHUB_OUTPUT"
      - name: Inspect updated version
        id: version
        if: steps.updater.outputs.exit_code == '0' && steps.updater.outputs.package_changes == 'true'
        run: |
          state=invalid
          set +e
          new_version=$(nix eval --raw ".#$PACKAGE.version" 2> .ai-state/version-validation.log)
          exit_code=$?
          if [[ "$exit_code" == "0" ]]; then
            state=$(.github/scripts/classify_version.sh \
              "$(cat "$RUNNER_TEMP/old-version")" \
              "$new_version" \
              2>> .ai-state/version-validation.log)
            exit_code=$?
          fi
          set -e
          if [[ "$exit_code" != "0" ]]; then
            state=invalid
          fi
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: Validate deterministic candidate
        id: deterministic
        if: steps.version.outputs.state == 'advanced'
        run: |
          set +e
          nix develop .# -c .github/scripts/validate_candidate.sh \
            "$PACKAGE" \
            "$(cat "$RUNNER_TEMP/main-program")" \
            "$(cat "$RUNNER_TEMP/old-version")" \
            "$RUNNER_TEMP/preflight-new-version" \
            > .ai-state/deterministic-validation.log 2>&1
          exit_code=$?
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
      - name: Select update route
        id: route
        env:
          UPDATER_EXIT: ${{ steps.updater.outputs.exit_code }}
          PACKAGE_CHANGES: ${{ steps.updater.outputs.package_changes }}
          VERSION_STATE: ${{ steps.version.outputs.state }}
          DETERMINISTIC_EXIT: ${{ steps.deterministic.outputs.exit_code }}
        run: |
          route=$(.github/scripts/select_update_route.sh \
            "$UPDATER_EXIT" \
            "$PACKAGE_CHANGES" \
            "$VERSION_STATE" \
            "$DETERMINISTIC_EXIT")
          echo "route=$route" >> "$GITHUB_OUTPUT"
      - name: Record review state
        if: steps.route.outputs.route == 'ai'
        env:
          UPDATER_EXIT: ${{ steps.updater.outputs.exit_code }}
          VERSION_STATE: ${{ steps.version.outputs.state }}
          DETERMINISTIC_EXIT: ${{ steps.deterministic.outputs.exit_code }}
        run: |
          if [[ -z "$DETERMINISTIC_EXIT" ]]; then
            deterministic_state=not-run
          elif [[ "$DETERMINISTIC_EXIT" == "0" ]]; then
            deterministic_state=passed
          else
            deterministic_state=failed
          fi
          jq -n \
            --arg package "$PACKAGE" \
            --argjson updater_exit "$UPDATER_EXIT" \
            --arg version_state "$VERSION_STATE" \
            --arg deterministic_state "$deterministic_state" \
            '{package: $package, route: "ai", updater_exit: $updater_exit, version_state: $version_state, deterministic_validation: $deterministic_state, updater_log: ".ai-state/updater.log", version_log: (if $version_state == "" then null else ".ai-state/version-validation.log" end), deterministic_log: (if $deterministic_state == "not-run" then null else ".ai-state/deterministic-validation.log" end)}' \
            > .ai-state/state.json
      - name: Review or repair with OpenCode
        if: steps.route.outputs.route == 'ai'
        env:
          DENDRO_API_KEY: ${{ secrets.DENDRO_API_KEY }}
        run: |
          export OPENCODE_CONFIG_CONTENT
          OPENCODE_CONFIG_CONTENT=$(cat .github/opencode.json)
          export OPENCODE_DISABLE_AUTOUPDATE=1
          export OPENCODE_DISABLE_CLAUDE_CODE=1
          message=$(cat .github/evergreen-review-prompt.md)
          message+=$'\n\nThe validated package attribute is `'
          message+="$PACKAGE"
          message+=$'`. Read the evidence under `.ai-state/`.'
          nix develop .# -c opencode run \
            --pure \
            --auto \
            --model dendro/gpt-5.6-terra \
            "$message"
      - name: Export candidate
        env:
          ROUTE: ${{ steps.route.outputs.route }}
        run: |
          mkdir -p "$RUNNER_TEMP/candidate"
          cp "$RUNNER_TEMP/old-version" "$RUNNER_TEMP/candidate/old-version"
          cp "$RUNNER_TEMP/main-program" "$RUNNER_TEMP/candidate/main-program"
          if [[ "$ROUTE" == "up-to-date" ]]; then
            printf 'up-to-date' > "$RUNNER_TEMP/candidate/state"
            exit 0
          fi
          if [[ "$ROUTE" != "deterministic" && "$ROUTE" != "ai" ]]; then
            echo "Invalid update route: $ROUTE" >&2
            exit 1
          fi

          outside=$(git status --porcelain --untracked-files=all -- . ":(exclude)pkgs/$PACKAGE/**")
          if [[ -n "$outside" ]]; then
            echo "Candidate changed files outside pkgs/$PACKAGE:" >&2
            printf '%s\n' "$outside" >&2
            exit 1
          fi
          git add -A -- "pkgs/$PACKAGE"
          .github/scripts/validate_package_source.sh "pkgs/$PACKAGE"
          if git ls-files --stage -- "pkgs/$PACKAGE" | grep -q '^120000 '; then
            echo "Package candidates may not contain symlinks" >&2
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "$ROUTE route produced no package changes" >&2
            exit 1
          fi
          git diff --cached --check
          git diff --cached --binary --full-index > "$RUNNER_TEMP/candidate/changes.patch"
          printf 'candidate' > "$RUNNER_TEMP/candidate/state"
          if [[ "$ROUTE" == "deterministic" ]]; then
            printf 'deterministic' > "$RUNNER_TEMP/candidate/origin"
          else
            printf 'ai-repaired' > "$RUNNER_TEMP/candidate/origin"
          fi
      - name: Upload candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evergreen-candidate-${{ matrix.package }}
          path: ${{ runner.temp }}/candidate
          if-no-files-found: error
          retention-days: 7
  validate-package:
    name: validate (${{ matrix.package }})
    needs: [flake, prepare-package]
    if: ${{ always() && needs.flake.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.flake.outputs.packages) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      PACKAGE: ${{ matrix.package }}
    steps:
      - name: Checkout trusted revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.flake.outputs.base_sha }}
          fetch-depth: 1
          persist-credentials: false
      - name: Download candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evergreen-candidate-${{ matrix.package }}
          path: ${{ runner.temp }}/candidate
      - name: Inspect candidate
        id: candidate
        run: |
          state=$(cat "$RUNNER_TEMP/candidate/state")
          if [[ "$state" != "candidate" && "$state" != "up-to-date" ]]; then
            echo "Invalid candidate state: $state" >&2
            exit 1
          fi
          echo "state=$state" >> "$GITHUB_OUTPUT"
          if [[ "$state" == "candidate" ]]; then
            origin=$(cat "$RUNNER_TEMP/candidate/origin")
            if [[ "$origin" != "deterministic" && "$origin" != "ai-repaired" ]]; then
              echo "Invalid candidate origin: $origin" >&2
              exit 1
            fi
            echo "origin=$origin" >> "$GITHUB_OUTPUT"
          fi
      - name: Apply candidate
        if: steps.candidate.outputs.state == 'candidate'
        run: git apply --index "$RUNNER_TEMP/candidate/changes.patch"
      - name: Install Nix
        if: steps.candidate.outputs.state == 'candidate'
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            accept-flake-config = true
            experimental-features = nix-command flakes
      - name: Validate candidate
        if: steps.candidate.outputs.state == 'candidate'
        run: |
          nix develop .# -c .github/scripts/validate_candidate.sh \
            "$PACKAGE" \
            "$(cat "$RUNNER_TEMP/candidate/main-program")" \
            "$(cat "$RUNNER_TEMP/candidate/old-version")" \
            "$RUNNER_TEMP/candidate/new-version"
          if ! nix eval --raw ".#$PACKAGE.meta.changelog" > "$RUNNER_TEMP/candidate/changelog" 2>/dev/null; then
            : > "$RUNNER_TEMP/candidate/changelog"
          fi
      - name: Prepare verified result
        env:
          CANDIDATE_STATE: ${{ steps.candidate.outputs.state }}
        run: |
          mkdir -p "$RUNNER_TEMP/verified"
          cp "$RUNNER_TEMP/candidate/state" "$RUNNER_TEMP/verified/state"
          if [[ "$CANDIDATE_STATE" == "candidate" ]]; then
            cp "$RUNNER_TEMP/candidate/changes.patch" "$RUNNER_TEMP/verified/changes.patch"
            cp "$RUNNER_TEMP/candidate/old-version" "$RUNNER_TEMP/verified/old-version"
            cp "$RUNNER_TEMP/candidate/new-version" "$RUNNER_TEMP/verified/new-version"
            cp "$RUNNER_TEMP/candidate/origin" "$RUNNER_TEMP/verified/origin"
            cp "$RUNNER_TEMP/candidate/changelog" "$RUNNER_TEMP/verified/changelog"
          fi
      - name: Upload verified result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: evergreen-verified-${{ matrix.package }}
          path: ${{ runner.temp }}/verified
          if-no-files-found: error
          retention-days: 1
  publish-package:
    name: publish (${{ matrix.package }})
    needs: [flake, validate-package]
    if: ${{ always() && needs.flake.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.flake.outputs.packages) }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      PACKAGE: ${{ matrix.package }}
    steps:
      - name: Checkout current main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false
      - name: Download verified result
        id: verified
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: evergreen-verified-${{ matrix.package }}
          path: ${{ runner.temp }}/verified
      - name: Apply verified result
        id: result
        env:
          VERIFIED_DOWNLOAD: ${{ steps.verified.outcome }}
        run: |
          if [[ "$VERIFIED_DOWNLOAD" != "success" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          state=$(cat "$RUNNER_TEMP/verified/state")
          if [[ "$state" == "up-to-date" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "$state" != "candidate" ]]; then
            echo "Invalid verified state: $state" >&2
            exit 1
          fi
          old_version=$(cat "$RUNNER_TEMP/verified/old-version")
          new_version=$(cat "$RUNNER_TEMP/verified/new-version")
          if [[ ! "$old_version" =~ ^[0-9A-Za-z][0-9A-Za-z._+~-]{0,127}$ || ! "$new_version" =~ ^[0-9A-Za-z][0-9A-Za-z._+~-]{0,127}$ ]]; then
            echo "Invalid verified version metadata" >&2
            exit 1
          fi
          origin=$(cat "$RUNNER_TEMP/verified/origin")
          case "$origin" in
            deterministic)
              origin_label=bot-deterministic
              origin_name="deterministic updater"
              ;;
            ai-repaired)
              origin_label=bot-ai-repair
              origin_name="AI repair"
              ;;
            *)
              echo "Invalid verified origin: $origin" >&2
              exit 1
              ;;
          esac
          changelog=$(cat "$RUNNER_TEMP/verified/changelog")
          if [[ -n "$changelog" && ( "$changelog" == *$'\n'* || ! "$changelog" =~ ^https?://[^[:space:]]{1,2048}$ ) ]]; then
            echo "Invalid changelog URL" >&2
            exit 1
          fi
          git apply --3way --index "$RUNNER_TEMP/verified/changes.patch"
          {
            printf "Automated update of \`%s\` from \`%s\` to \`%s\`.\n\n" "$PACKAGE" "$old_version" "$new_version"
            printf -- "- Origin: \`%s\`\n" "$origin_name"
            printf -- '- Validation: updater idempotence, package build, and smoke check\n'
            if [[ -n "$changelog" ]]; then
              printf -- '- Changelog: %s\n' "$changelog"
            fi
          } > "$RUNNER_TEMP/pull-request-body.md"
          {
            echo "publish=true"
            echo "old_version=$old_version"
            echo "new_version=$new_version"
            echo "origin_label=$origin_label"
          } >> "$GITHUB_OUTPUT"
      - name: Generate publisher token
        if: steps.result.outputs.publish == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - name: Create pull request
        id: pull_request
        if: steps.result.outputs.publish == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: main
          branch: bot/${{ matrix.package }}
          delete-branch: true
          add-paths: pkgs/${{ matrix.package }}
          commit-message: "${{ matrix.package }}: ${{ steps.result.outputs.old_version }} -> ${{ steps.result.outputs.new_version }}"
          committer: galactic-batter[bot] <304539431+galactic-batter[bot]@users.noreply.github.com>
          author: galactic-batter[bot] <304539431+galactic-batter[bot]@users.noreply.github.com>
          sign-commits: true
          title: "${{ matrix.package }}: ${{ steps.result.outputs.old_version }} -> ${{ steps.result.outputs.new_version }}"
          body-path: ${{ runner.temp }}/pull-request-body.md
          labels: |
            bot
            ${{ steps.result.outputs.origin_label }}
          reviewers: codgician
      - name: Enable deterministic auto-merge
        if: steps.result.outputs.origin_label == 'bot-deterministic' && steps.pull_request.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.pull_request.outputs.pull-request-number }}
          REPOSITORY: ${{ github.repository }}
        run: gh pr merge --repo "$REPOSITORY" --auto --squash "$PR_NUMBER"
  summary:
    needs: [flake, prepare-package, validate-package, publish-package]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: Summarize package results
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          PACKAGES: ${{ needs.flake.outputs.packages }}
        with:
          script: |-
            let packages;
            try {
              packages = JSON.parse(process.env.PACKAGES || "[]");
            } catch {
              throw new Error("Invalid package matrix output");
            }
            if (!Array.isArray(packages) || packages.some((name) => !/^[a-z][a-z0-9_-]{0,63}$/.test(name))) {
              throw new Error("Invalid package matrix output");
            }

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              filter: "latest",
              per_page: 100,
            });
            const jobsByName = new Map(jobs.map((job) => [job.name, job]));
            const rows = [["Package", "Result"]];
            const blocked = [];

            for (const packageName of packages) {
              const stages = [
                ["prepare", jobsByName.get(`prepare (${packageName})`)],
                ["validate", jobsByName.get(`validate (${packageName})`)],
                ["publish", jobsByName.get(`publish (${packageName})`)],
              ];
              const failed = stages.find(([, job]) => !job || job.conclusion !== "success");
              if (failed) {
                const [stage, job] = failed;
                rows.push([packageName, `blocked (${stage}: ${job?.conclusion || "missing"})`]);
                blocked.push(packageName);
                continue;
              }

              const prepare = stages[0][1];
              const publish = stages[2][1];
              const pullRequest = publish.steps.find((step) => step.name === "Create pull request");
              if (pullRequest?.conclusion !== "success") {
                rows.push([packageName, "up-to-date"]);
                continue;
              }

              const review = prepare.steps.find((step) => step.name === "Review or repair with OpenCode");
              rows.push([packageName, review?.conclusion === "success" ? "AI-repaired candidate" : "deterministic candidate"]);
            }

            await core.summary
              .addHeading("Evergreen package summary")
              .addTable(rows)
              .write();

            if (packages.length === 0) {
              core.setFailed("Package discovery produced no results");
            } else if (blocked.length > 0) {
              core.setFailed(`Blocked packages: ${blocked.join(", ")}`);
            }
