# GitHub Actions workflow to automatically update packages.
name: Update Packages

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'

jobs:
  update-packages:
    runs-on: ubuntu-latest
    # Authenticate GitHub API calls (nix-update's release lookups) to avoid
    # unauthenticated rate limits.
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: nu {0}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install nushell + nix-update
        # Bootstrapping step — bash because nu is what we're installing.
        shell: bash
        run: |
          nix profile install nixpkgs#nushell nixpkgs#nix-update
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Configure git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update flake inputs
        run: |
          nix flake update
          if not (git status --porcelain flake.lock | str trim | is-empty) {
            git add flake.lock
            git commit -m "flake: update inputs"
          }

      - name: Update packages via nix-update
        shell: bash
        run: |
          set -euo pipefail

          run_update_script() {
            local attr="$1"
            mapfile -t update_script < <(nix eval --json ".#${attr}.passthru.updateScript" | jq -r '.[]')
            local cmd="${update_script[0]}"
            if [[ ! -x "$cmd" ]]; then
              cmd="$(command -v "$(basename "$cmd")")"
            fi
            "$cmd" "${update_script[@]:1}" --flake "$attr" --commit
          }

          run_update_script baidupcs-go
          run_update_script quarkpantool
          run_update_script blueprint-mcp
          run_update_script zju-connect

      - name: Update special packages via nu scripts
        run: |
          nu scripts/update-cstar-toolchain.nu

          if not (git status --porcelain pkgs/cstar-toolchain/default.nix | str trim | is-empty) {
            git add pkgs/cstar-toolchain/default.nix
            git commit -m "cstar-toolchain: update"
          }

          nu scripts/update-wechat.nu

          if not (git status --porcelain pkgs/wechat/linux.nix | str trim | is-empty) {
            git add pkgs/wechat/linux.nix
            git commit -m "wechat: update"
          }

      - name: Push changes
        run: |
          let ahead = (git rev-list HEAD ^origin/main --count | str trim | into int)
          if $ahead > 0 {
            git push
          } else {
            print "Nothing to push."
          }
