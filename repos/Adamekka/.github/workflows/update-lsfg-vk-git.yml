name: Update lsfg-vk-git

on:
  schedule:
    - cron: "00 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update lsfg-vk-git
    runs-on: ubuntu-latest

    environment: Update CI

    env:
      PAT_TOKEN: ${{ secrets.PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Update package
        env:
          # nix-update starts nested Nix commands, so this must be inherited rather
          # than passed only to the outer `nix run`.
          NIX_CONFIG: |
            fallback = true
        run: nix run nixpkgs#nix-update -- --flake --use-update-script lsfg-vk-git

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.PAT_TOKEN }}
          add-paths: pkgs/lsfg-vk-git/default.nix
          branch: update/lsfg-vk-git
          commit-message: Update lsfg-vk-git
          delete-branch: true
          title: Update lsfg-vk-git
          body: |
            Automated update for `lsfg-vk-git` from the upstream `develop` branch.
