name: Update wondershaper

on:
  schedule:
    - cron: "00 9 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update wondershaper
    runs-on: ubuntu-latest

    environment: Update CI

    env:
      PAT_TOKEN: ${{ secrets.PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Update package
        env:
          # nix-update starts nested Nix commands, so this must be inherited rather
          # than passed only to the outer `nix run`.
          NIX_CONFIG: |
            fallback = true
        run: nix run nixpkgs#nix-update -- --flake --use-update-script wondershaper

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ env.PAT_TOKEN }}
          add-paths: pkgs/wondershaper/default.nix
          branch: update/wondershaper
          commit-message: Update wondershaper
          delete-branch: true
          title: Update wondershaper
          body: |
            Automated update for `wondershaper` from upstream `master`.
