name: Update lunar-tear

on:
  schedule:
    - cron: "00 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update lunar-tear
    runs-on: ubuntu-latest

    env:
      PAT_TOKEN: ${{ secrets.PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Update package
        env:
          # nix-update starts nested Nix commands, so this must be inherited rather
          # than passed only to the outer `nix run`.
          NIX_CONFIG: |
            fallback = true
        run: nix run nixpkgs#nix-update -- --flake --use-update-script lunar-tear

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ env.PAT_TOKEN }}
          add-paths: pkgs/lunar-tear/default.nix
          branch: update/lunar-tear
          commit-message: Update lunar-tear
          delete-branch: true
          title: Update lunar-tear
          body: |
            Automated update for `lunar-tear` from upstream release tags.
