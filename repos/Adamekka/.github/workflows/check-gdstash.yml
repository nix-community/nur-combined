name: Check GD Stash

on:
  schedule:
    - cron: "00 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check GD Stash
    environment: Check GD Stash
    runs-on: ubuntu-latest
    env:
      NEXUSMODS_API_KEY: ${{ secrets.NEXUSMODS_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check upstream metadata
        run: |
          if [ -z "${NEXUSMODS_API_KEY:-}" ]; then
            echo "::error title=Missing NexusMods API key::Add a NEXUSMODS_API_KEY repository secret from https://www.nexusmods.com/settings/api-keys."
            exit 1
          fi

          api_base_url="https://api.nexusmods.com/v3"
          files_json="$(mktemp)"
          scan_json="$(mktemp)"
          mod_json="$(mktemp)"
          versions_json="$(mktemp)"

          curl_api() {
            curl \
              --fail \
              --header "Accept: application/json" \
              --header "apikey: ${NEXUSMODS_API_KEY}" \
              --location \
              --output "$1" \
              --silent \
              --show-error \
              --user-agent "Adamekka/nur-packages GD Stash update check" \
              "$2"
          }

          curl_api "$mod_json" "$api_base_url/games/grimdawn/mods/2"
          mod_id="$(python - "$mod_json" <<'PY'
          import json
          import sys
          from pathlib import Path

          print(json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["data"]["id"])
          PY
          )"

          curl_api "$files_json" "$api_base_url/mods/$mod_id/files"
          mod_file_id="$(python - "$files_json" <<'PY'
          import json
          import sys
          from pathlib import Path

          mod_files = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["data"]["mod_files"]
          matching_files = [mod_file for mod_file in mod_files if mod_file["name"] == "GD Stash"]
          if not matching_files:
              print("::error title=GD Stash check failed::Could not find the GD Stash file in NexusMods API metadata.")
              sys.exit(1)

          print(matching_files[0]["id"])
          PY
          )"

          curl_api "$versions_json" "$api_base_url/mod-files/$mod_file_id/versions"
          python - "$mod_json" <<'PY' | curl \
            --data-binary @- \
            --fail \
            --header "Accept: application/json" \
            --header "Content-Type: application/json" \
            --header "apikey: ${NEXUSMODS_API_KEY}" \
            --output "$scan_json" \
            --silent \
            --show-error \
            --user-agent "Adamekka/nur-packages GD Stash update check" \
            "https://api.nexusmods.com/v2/graphql"
          import json
          import sys
          from pathlib import Path

          mod = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["data"]
          print(json.dumps({
              "query": "query GDStashScanStatus($modId: ID!, $gameId: ID!) { modFiles(modId: $modId, gameId: $gameId) { fileId scannedV2 } }",
              "variables": {
                  "gameId": mod["game_id"],
                  "modId": mod["game_scoped_id"],
              },
          }))
          PY

          python - "$versions_json" "$scan_json" <<'PY'
          import base64
          import hashlib
          import json
          import re
          import sys
          from pathlib import Path

          archive_path = Path("pkgs/gdstash/GDStash.zip")
          package_path = Path("pkgs/gdstash/default.nix")
          package_text = package_path.read_text(encoding="utf-8")
          versions = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))["data"]["versions"]
          scan_response = json.loads(Path(sys.argv[2]).read_text(encoding="utf-8"))

          def require_match(pattern, text, description):
              match = re.search(pattern, text, re.MULTILINE)
              if match is None:
                  print(f"::error title=GD Stash check failed::Could not find {description}.")
                  sys.exit(1)
              return match.group(1)

          packaged_version = require_match(r'^\s*version = "([^"]+)";', package_text, "packaged version")
          packaged_file_id = require_match(r'^\s*nexusFileId = "([^"]+)";', package_text, "packaged Nexus file id")
          packaged_hash_sri = require_match(r'^\s*nexusFileHash = "sha256-([^"]+)";', package_text, "packaged Nexus file hash")
          packaged_hash_hex = base64.b64decode(packaged_hash_sri).hex()
          local_hash_hex = hashlib.sha256(archive_path.read_bytes()).hexdigest()

          primary_versions = [version for version in versions if version.get("is_primary")]
          candidate_versions = primary_versions if primary_versions else versions
          if not candidate_versions:
              print("::error title=GD Stash check failed::NexusMods API returned no GD Stash file versions.")
              sys.exit(1)

          latest_version = max(candidate_versions, key=lambda version: version["uploaded_at"])
          upstream_file_id = latest_version["game_scoped_id"]
          upstream_version = latest_version["version"]

          if scan_response.get("errors"):
              print("::error title=GD Stash check failed::NexusMods GraphQL returned errors while checking the file scan status.")
              print(json.dumps(scan_response["errors"]))
              sys.exit(1)

          matching_files = [
              mod_file
              for mod_file in scan_response.get("data", {}).get("modFiles", [])
              if str(mod_file["fileId"]) == str(upstream_file_id)
          ]
          if not matching_files:
              print(f"::error title=GD Stash check failed::Could not find Nexus file {upstream_file_id} in GraphQL metadata.")
              sys.exit(1)
          scan_status = matching_files[0]["scannedV2"]

          print(f"Packaged GD Stash: version {packaged_version}, file id {packaged_file_id}, sha256 {packaged_hash_hex}")
          print(f"Committed GD Stash archive: sha256 {local_hash_hex}")
          print(f"Upstream GD Stash: version {upstream_version}, file id {upstream_file_id}, scan status {scan_status}")

          if packaged_hash_hex != local_hash_hex:
              print(f"::error title=GD Stash check failed::Metadata sha256 {packaged_hash_hex} does not match pkgs/gdstash/GDStash.zip {local_hash_hex}.")
              sys.exit(1)

          upstream_differences = []
          if packaged_version != upstream_version:
              upstream_differences.append(f"version {packaged_version} -> {upstream_version}")
          if packaged_file_id != upstream_file_id:
              upstream_differences.append(f"file id {packaged_file_id} -> {upstream_file_id}")

          # A quarantined archive cannot be downloaded for packaging, so wait for NexusMods to release it.
          if upstream_differences and scan_status == "QUARANTINED":
              print("::warning title=GD Stash update quarantined::" + "; ".join(upstream_differences))
              print(f"NexusMods reports file {upstream_file_id} as quarantined; the update check will retry after its status changes.")
              sys.exit(0)

          if upstream_differences:
              print("::error title=GD Stash manual update required::" + "; ".join(upstream_differences))
              print("Download the updated archive from NexusMods, replace pkgs/gdstash/GDStash.zip, then update pkgs/gdstash/default.nix and README.md if needed.")
              sys.exit(1)

          print("GD Stash is current.")
          PY
