name: "Update packages"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    # Run every Sunday at 3:00 AM
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to update (leave empty for all)'
        required: false
        default: ''

jobs:
  update:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Setup cachix
        uses: cachix/cachix-action@v17
        with:
          name: uriotv
          signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install nix-update
        run: nix profile install nixpkgs#nix-update

      - name: Update packages
        id: update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect all summary lines into a single string
          summary="## Package Update Status"
          summary+=$'\n'"| Package | Status | Message |"
          summary+=$'\n'"| --- | --- | --- |"

          FAILED=0

          run_update() {
            local script=$1
            local pkg_name=$(basename $(dirname $script))

            echo "::group::Updating $pkg_name"

            local output
            if output=$(./"$script" 2>&1); then
              local escaped="${output//$'\n'/<br>}"
              echo "✅ Success"
              summary+=$'\n'"| $pkg_name | ✅ Success | <pre>$escaped</pre> |"
            else
              local escaped="${output//$'\n'/<br>}"
              echo "❌ Failed"
              summary+=$'\n'"| $pkg_name | ❌ Failed | <pre>$escaped</pre> |"
              FAILED=1
            fi

            echo "$output"
            echo "::endgroup::"
          }

          # If specific package requested, update only that
          if [ -n "${{ github.event.inputs.package }}" ]; then
            run_update "pkgs/${{ github.event.inputs.package }}/update.sh"
          else
            # Update all packages
            for script in pkgs/*/update.sh; do
              run_update "$script"
            done
          fi

          # Write summary to step summary and step output
          {
            echo "$summary" >> "$GITHUB_STEP_SUMMARY"
          }
          {
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ $FAILED -ne 0 ]; then
            echo "::error::Some packages failed to update"
            exit 1
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT_FOR_UPDATES }}
          commit-message: "chore: auto-update packages"
          title: "chore: Auto-update packages"
          body: |
            This PR was automatically created by the update workflow.

            See the [Build Log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ${{ steps.update.outputs.summary }}
          branch: auto-update-packages
          delete-branch: true
