name: Update NixOS Packages

on:
  schedule:
    - cron: '0 3 * * *' # Daily, 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-nixos-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Run update scripts
        run: |
          find nixos/pkgs -maxdepth 2 -name update.sh -print0 | while IFS= read -r -d '' script; do
            echo "::group::Updating $(dirname "$script")"
            chmod +x "$script"
            bash "$script" || echo "⚠️ Update failed for $script"
            echo "::endgroup::"
          done

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore(nixos): update package versions" && git push
