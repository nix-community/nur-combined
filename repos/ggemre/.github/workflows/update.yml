name: Update packages

on:
  schedule:
    - cron: "50 10 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install necessary tools
        run: nix shell nixpkgs#jq nixpkgs#gh

      - name: Find packages with updateScript
        run: |
          nix eval --json \
            --apply 'pkgs:
              builtins.mapAttrs
                (name: pkg: pkg.passthru.updateScript or null)
                pkgs
            ' \
            .#packages.x86_64-linux \
          | jq -r '
              to_entries[]
              | select(.value != null)
              | .key
            ' > packages.txt

      - name: Update packages individually
        run: |
          while read pkg; do
            echo "== Checking $pkg =="

            old=$(nix eval --raw ".#packages.x86_64-linux.$pkg.version")
            branch="$pkg-${{ github.run_id }}"

            git checkout main
            git pull
            git checkout -b "$branch"

            nix run nixpkgs#nix-update -- "$pkg" --flake || true

            if git diff --quiet; then
              echo "No update for $pkg"
              continue
            fi

            new=$(nix eval --raw ".#packages.x86_64-linux.$pkg.version")
            date=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            git commit -am "$pkg: $old -> $new"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin "$branch"

            gh pr create \
              --title "$pkg: $old -> $new" \
              --body "Automated update via nix-update.\n$date" \
              --base main \
              --head "$branch"

            gh pr edit "$branch" --add-reviewer ggemre

          done < packages.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
