name: Update packages

on:
  schedule:
    - cron: "50 10 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install necessary tools
        run: nix shell nixpkgs#gh

      - name: Update packages individually
        run: |
          for script in pkgs/*/update.sh; do
            [ -f "$script" ] || continue

            pkg=$(basename "$(dirname "$script")")
            echo "== Checking $pkg =="

            old=$(nix eval --raw ".#packages.x86_64-linux.$pkg.version")
            branch="$pkg-${{ github.run_id }}"

            git checkout main
            git pull
            git checkout -b "$branch"

            bash "$script" || true

            if git diff --quiet; then
              echo "No update for $pkg"
              continue
            fi

            new=$(nix eval --raw ".#packages.x86_64-linux.$pkg.version")
            date=$(date -u +%Y-%m-%dT%H:%M:%SZ)

            git commit -am "$pkg: $old -> $new"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin "$branch"

            gh pr create \
              --title "$pkg: $old -> $new" \
              --body "Automated update via nix-update on $date." \
              --base main \
              --head "$branch"

            gh pr edit "$branch" --add-reviewer ggemre

          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
