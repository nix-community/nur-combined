name: Build and Cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x86-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: mattrobenolt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # Only push on main branch
          skipPush: ${{ github.ref != 'refs/heads/main' }}

      - name: Build packages (from source only)
        run: |
          echo "🏗️ Building source packages for x86_64-linux..."

          # Only build packages that compile from source (skip prebuilt binaries)
          nix build .#benchstat .#zigdoc .#tracy

          echo "✅ All source packages built successfully"

  build-arm-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm64

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
        with:
          extra-conf: |
            extra-platforms = aarch64-linux

      - name: Setup Cachix
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1 # v16
        with:
          name: mattrobenolt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ github.ref != 'refs/heads/main' }}

      - name: Build packages (from source only)
        run: |
          echo "🏗️ Building source packages for aarch64-linux (via QEMU)..."

          # Only build packages that compile from source (skip prebuilt binaries)
          nix build .#benchstat .#zigdoc .#tracy --system aarch64-linux

          echo "✅ All source packages built successfully"

  build-arm-macos:
    runs-on: macos-14  # ARM (M1/M2/M3)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Setup Cachix
        uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: mattrobenolt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ github.ref != 'refs/heads/main' }}

      - name: Build packages (from source only)
        run: |
          echo "🏗️ Building source packages for aarch64-darwin..."

          # Only build packages that compile from source (skip prebuilt binaries)
          nix build .#benchstat .#zigdoc .#tracy

          echo "✅ All source packages built successfully"
