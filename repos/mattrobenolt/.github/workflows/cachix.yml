name: Build and Cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-x86-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mattrobenolt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # Only push on main branch
          skipPush: ${{ github.ref != 'refs/heads/main' }}

      - name: Build packages (from source only)
        run: |
          echo "🏗️ Building source packages for x86_64-linux..."

          # Only build packages that compile from source (skip prebuilt binaries)
          nix build .#benchstat .#zigdoc .#tracy

          echo "✅ All source packages built successfully"

  build-arm-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          extra-conf: |
            extra-platforms = aarch64-linux

      - name: Setup Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mattrobenolt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ github.ref != 'refs/heads/main' }}

      - name: Build packages (from source only)
        run: |
          echo "🏗️ Building source packages for aarch64-linux (via QEMU)..."

          # Only build packages that compile from source (skip prebuilt binaries)
          nix build .#benchstat .#zigdoc .#tracy --system aarch64-linux

          echo "✅ All source packages built successfully"

  build-arm-macos:
    runs-on: macos-14  # ARM (M1/M2/M3)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Cachix
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mattrobenolt
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ github.ref != 'refs/heads/main' }}

      - name: Build packages (from source only)
        run: |
          echo "🏗️ Building source packages for aarch64-darwin..."

          # Only build packages that compile from source (skip prebuilt binaries)
          nix build .#benchstat .#zigdoc .#tracy

          echo "✅ All source packages built successfully"
