name: Update All Packages

on:
  schedule:
    # Run daily at 4 AM UTC (after individual updaters)
    - cron: '0 4 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 zizmor: ignore[artipacked] git-auto-commit needs persisted credentials
        with:
          persist-credentials: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Update all packages
        run: |
          echo "📦 Updating all packages..."
          nix develop -c just update-all

      - name: Check for changes
        id: verify-diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "### 📝 Changes detected:" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            git diff >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Validate flake
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🔍 Running flake checks..."
          nix flake check --no-build
          echo "✓ Flake checks passed"

      - name: Build all packages
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🏗️ Building all packages to verify updates..."

          # Build benchstat package
          nix build .#benchstat --no-link
          echo "✓ benchstat builds"

          # Build Go packages
          nix build .#go-bin --no-link
          echo "✓ go-bin builds"

          # Build inbox package
          nix build .#inbox --no-link
          echo "✓ inbox builds"

          # Build prismacat package
          nix build .#prismacat --no-link
          echo "✓ prismacat builds"

          # Build txtar package
          nix build .#txtar --no-link
          echo "✓ txtar builds"

          # Build zigdoc package
          nix build .#zigdoc --no-link
          echo "✓ zigdoc builds"

          # Build ziglint package
          nix build .#ziglint --no-link
          echo "✓ ziglint builds"

          nix build .#zed --no-link
          echo "✓ zed builds"

          nix build .#zed-preview --no-link
          echo "✓ zed-preview builds"

      - name: Test binaries
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🧪 Testing binaries..."
          nix run .#benchstat -- -h
          nix run .#go-bin -- version
          nix run .#inbox -- --help
          nix run .#prismacat -- --help
          nix run .#txtar -- -c -f /tmp/txtar-test.txtar README.md
          nix run .#zigdoc -- --help || echo "✓ zigdoc exists (may require input)"
          nix run .#ziglint -- --version
          echo "✓ All binaries work"

      - name: Commit and push changes
        if: steps.verify-diff.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: 'chore: update all packages'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Summary
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "### 🎉 All packages updated and validated!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validation:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Flake checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All packages build successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All binaries tested and working" >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.verify-diff.outputs.changed != 'true'
        run: |
          echo "### ℹ️ No updates available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All packages are already up to date." >> $GITHUB_STEP_SUMMARY
