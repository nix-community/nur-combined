name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Check formatting
        run: |
          nix develop -c just check

      - name: Check GitHub Actions security
        run: |
          nix develop -c just check-ci-security

      - name: Summary
        run: |
          echo "### ✅ Linting passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Formatting is correct" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No anti-patterns found" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No unused code detected" >> $GITHUB_STEP_SUMMARY
