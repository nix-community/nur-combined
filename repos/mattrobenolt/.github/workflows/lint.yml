name: Lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Check formatting
        run: |
          nix develop -c just check

      - name: Check GitHub Actions security
        run: |
          nix develop -c just check-ci-security

      - name: Summary
        run: |
          echo "### ✅ Linting passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Formatting is correct" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No anti-patterns found" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ No unused code detected" >> $GITHUB_STEP_SUMMARY
