name: Update benchstat

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run benchstat update script
        run: |
          nix develop -c just update-benchstat

      - name: Check for changes
        id: verify-diff
        run: |
          git diff --quiet pkgs/benchstat/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Validate flake
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🔍 Running flake checks..."
          nix flake check --no-build
          echo "✓ Flake checks passed"

      - name: Build benchstat package
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🏗️ Building benchstat..."
          nix build .#benchstat --no-link
          echo "✓ benchstat builds successfully"

      - name: Test benchstat binary
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🧪 Testing benchstat..."
          nix run .#benchstat -- -h
          echo "✓ benchstat works"

      - name: Commit and push changes
        if: steps.verify-diff.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update benchstat version'
          file_pattern: 'pkgs/benchstat/*'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Summary
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "### 🎉 benchstat version updated and validated!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validation:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Flake checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ benchstat builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ benchstat binary tested" >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.verify-diff.outputs.changed != 'true'
        run: |
          echo "### ℹ️ No updates available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "benchstat is already up to date." >> $GITHUB_STEP_SUMMARY
