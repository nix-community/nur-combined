name: Update zigdoc

on:
  schedule:
    # Run daily at 3:15 AM UTC
    - cron: '15 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run zigdoc update script
        run: |
          nix develop -c just update-zigdoc

      - name: Check for changes
        id: verify-diff
        run: |
          git diff --quiet pkgs/zigdoc/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Validate flake
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🔍 Running flake checks..."
          nix flake check --no-build
          echo "✓ Flake checks passed"

      - name: Build and test zigdoc package
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "🏗️ Building zigdoc..."
          nix build .#zigdoc --no-link
          echo "✓ zigdoc builds successfully"

          echo "🧪 Testing zigdoc binary..."
          nix run .#zigdoc -- --help || echo "✓ zigdoc exists (may require input)"

      - name: Commit and push changes
        if: steps.verify-diff.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update zigdoc version'
          file_pattern: 'pkgs/zigdoc/*'
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>

      - name: Summary
        if: steps.verify-diff.outputs.changed == 'true'
        run: |
          echo "### 🎉 zigdoc version updated and validated!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Validation:**" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Flake checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Package builds successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ zigdoc binary tested" >> $GITHUB_STEP_SUMMARY

      - name: No changes
        if: steps.verify-diff.outputs.changed != 'true'
        run: |
          echo "### ℹ️ No updates available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "zigdoc version is already up to date." >> $GITHUB_STEP_SUMMARY
