name: Build and populate cache

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      skip_cachix_push:
        description: Skip cachix push
        required: true
        default: false
        type: boolean

      skip_updating_nur:
        description: Skip updating NUR
        required: true
        default: false
        type: boolean

jobs:
  build:
    strategy:
      matrix:
        cachix_name:
          - jitterbug
        nur_repo:
          - jitterbug
        nix_path:
          - nixpkgs=channel:nixos-unstable
        include:
          - runner: ubuntu-latest
            kernel: linux
            arch: x86_64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: ${{ matrix.nix_path }}
          extra_nix_config: |
            accept-flake-config = true

      - name: Setup cachix
        uses: cachix/cachix-action@v16
        with:
          name: ${{ matrix.cachix_name }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: ${{ (github.event_name != 'workflow_dispatch' && 'false') || inputs.skip_cachix_push }}

      - name: Build
        run: >
          nix run github:Mic92/nix-fast-build
          --
          --no-nom
          --skip-cached
          ${{ ((github.event_name != 'workflow_dispatch' || !inputs.skip_cachix_push) && format('--cachix-cache "{0}"', matrix.cachix_name)) || ''}}
          --flake .#checks."${{ matrix.arch }}-${{ matrix.kernel }}"

      - name: Update NUR
        if: ${{ (github.event_name != 'workflow_dispatch' && 'true') || !inputs.skip_updating_nur }}
        run: curl -XPOST "https://nur-update.nix-community.org/update?repo=${{ matrix.nur_repo }}"
