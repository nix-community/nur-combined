<!DOCTYPE html>
<html>
<body>
<div id="terminal" style="width: 100px; height: 100px;"></div>
<script type="module">
  import { Terminal } from './node_modules/xterm/lib/xterm.js';
  import { Unicode11Addon } from './node_modules/xterm-addon-unicode11/lib/xterm-addon-unicode11.js';
  
  try {
    const term = new Terminal();
    const addon = new Unicode11Addon();
    term.loadAddon(addon);
    term.unicode.activeVersion = '11';
    term.open(document.getElementById('terminal'));
    term.writeln("HELLO WORLD");
    console.log("SUCCESS");
  } catch (e) {
    console.error("FAILED: " + e.message);
  }
</script>
</body>
</html>
