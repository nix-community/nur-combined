name: "Flake.lock: update"

on:
  workflow_dispatch:
  schedule:
    - cron: "20 4 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31.9.1
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update root flake.lock
        run: nix flake update

      - name: Update dev flake.lock
        run: nix flake update --flake ./dev

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8.1.0
        with:
          branch: update_flake_lock_action
          delete-branch: true
          commit-message: "chore(flake): update lock files"
          title: "flake.lock: update"
          body: |
            Automated changes for root and dev lock files.
