name: "Build and populate cache"

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Setup cachix
        uses: cachix/cachix-action@v17
        with:
          name: sedlund
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Run flake checks
        run: nix flake check --print-build-logs

      - name: Build flake packages
        run: |
          packages="$(nix eval --raw '.#packages.x86_64-linux' --apply 'pkgs: toString (builtins.attrNames pkgs)')"
          if [ -z "$packages" ]; then
            echo "No flake packages exposed for x86_64-linux."
            exit 0
          fi

          for pkg in $packages; do
            if nix path-info --store 'https://sedlund.cachix.org' ".#packages.x86_64-linux.${pkg}" >/dev/null 2>&1; then
              echo "Skipping cached package: $pkg"
              continue
            fi

            echo "Building package: $pkg"
            nix build ".#packages.x86_64-linux.${pkg}" --print-build-logs
          done
