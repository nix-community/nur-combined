name: "Check for upstream package updates"

on:
  # Run weekly on Monday at 06:00 UTC
  schedule:
    - cron: '0 6 * * 1'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Check for upstream updates
      id: check
      run: |
        chmod +x ./scripts/check-updates.sh
        if ./scripts/check-updates.sh --json > /tmp/updates.json 2>&1; then
          echo "updates_found=false" >> $GITHUB_OUTPUT
        else
          echo "updates_found=true" >> $GITHUB_OUTPUT
        fi
        cat /tmp/updates.json

    - name: Create issue if updates found
      if: steps.check.outputs.updates_found == 'true'
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          const updates = JSON.parse(fs.readFileSync('/tmp/updates.json', 'utf8'));

          if (!updates || updates.length === 0) {
            console.log('No updates found');
            return;
          }

          // Build issue body
          let body = '## 🔄 Upstream Package Updates Available\n\n';
          body += 'The following packages have new versions available:\n\n';
          body += '| Package | Current | Latest | Source |\n';
          body += '|---------|---------|--------|--------|\n';

          for (const update of updates) {
            body += `| \`${update.package}\` | ${update.current} | **${update.latest}** | [${update.source}](${update.source}) |\n`;
          }

          body += '\n### Update Instructions\n\n';
          body += 'To update these packages:\n\n';
          body += '1. For `lemminx-maven`: Update `version` and `sha256` in `pkgs/lemminx-maven/default.nix`\n';
          body += '2. For `pi-acp`: Update `version`, `hash`, and `npmDepsHash` in `pkgs/pi-acp/default.nix`\n';
          body += '3. For `pi-packages`: Use the update script:\n';
          body += '   ```bash\n';
          body += '   ./pkgs/pi-packages/scripts/update-pi-package.sh <package-name> <version>\n';
          body += '   ```\n\n';
          body += '> **Note**: After updating, remember to also update the hash values by building the packages.';

          // Check for existing open issue
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'upstream-updates'
          });

          const title = '🔄 Upstream Package Updates Available';

          if (issues.data.length > 0) {
            // Update existing issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issues.data[0].number,
              body: body
            });
            console.log(`Updated existing issue #${issues.data[0].number}`);
          } else {
            // Create new issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['upstream-updates']
            });
            console.log('Created new issue');
          }

    - name: Comment on PR if triggered manually
      if: github.event_name == 'workflow_dispatch'
      run: |
        if [ -f /tmp/updates.json ]; then
          echo "### Update Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat /tmp/updates.json | jq -r '.[] | "- **\(.package)**: \(.current) → \(.latest)"' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No updates found or error parsing results" >> $GITHUB_STEP_SUMMARY
        fi
