name: Update md2

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Bump md2 to latest release
        run: |
          nix run nixpkgs#nix-update -- --file ./default.nix md2

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: update/md2
          delete-branch: true
          title: 'md2: update to latest release'
          commit-message: 'md2: update to latest release'
          body: |
            Automated bump via [`nix-update`](https://github.com/Mic92/nix-update).

            Updates `version`, source `hash`, and `vendorHash` for `pkgs/md2`.
