version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "nix"
    directory: "/internal"
    schedule:
      interval: "weekly"
