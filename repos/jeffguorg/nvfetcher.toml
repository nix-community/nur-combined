[agent-run]
src.git = "https://git.jeffthecoder.xyz/public/agent-run.git"
fetch.git = "https://git.jeffthecoder.xyz/public/agent-run.git"
cargo_lock = ["Cargo.lock"]
cargo_locks = ["Cargo.lock"]

[create-tauri-app]
src.github_tag = "tauri-apps/create-tauri-app"
src.include_regex = "^create-tauri-app-v.*$"
fetch.github = "tauri-apps/create-tauri-app"
cargo_lock = ["Cargo.lock"]
cargo_locks = ["Cargo.lock"]

[dingtalk-bin-amd64]
src.cmd = "curl -s --show-headers https://www.dingtalk.com/win/d/qd=linux_amd64 | awk -F': ' '$1~/location/{print $2}' | sed -nE 's#.*com\\.alibabainc\\.dingtalk_([0-9.]+)_.*\\.deb.*#\\1#p'"
fetch.url = "https://dtapp-pub.dingtalk.com/dingtalk-desktop/xc_dingtalk_update/linux_deb/Release/com.alibabainc.dingtalk_$ver_amd64.deb"

[claude-code-bin-arm64-linux]
