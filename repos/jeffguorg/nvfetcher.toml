[codex]
src.github = "openai/codex"
src.use_max_tag = true
src.include_regex = "rust-v[0-9]+\\.[0-9]+\\.[0-9]+"
fetch.github = "openai/codex"
cargo_lock = ["codex-rs/Cargo.lock"]
# backward compat
cargo_locks = ["codex-rs/Cargo.lock"]

