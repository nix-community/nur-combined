name: 'Auto update packages'
on:
  workflow_dispatch:
  schedule:
    # rebuild everyday at 5:55
    # TIP: Choose a random time here so not all repositories are build at once:
    # https://www.random.org/clock-times/?num=1&earliest=01%3A00&latest=08%3A00&interval=5&format=html&rnd=new
    - cron: '55 5 * * *'
jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Install nix
      uses: cachix/install-nix-action@V27
      with:
        nix_path: "nixpkgs=channel:nixos-unstable-small"
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - name: Update source groups
      run: |
        update_group() {
          local name="$1"
          local package_list="$2"
          local filter="$3"

          echo "Updating [$name]: $package_list"
          if ! nix run nixpkgs#nvfetcher -- --keep-going --filter "$filter"; then
            echo "::warning title=nvfetcher partial failure::$name had update failures; continuing with other groups"
          fi
        }

        update_group "create-tauri-app" "create-tauri-app" '^(create\-tauri\-app)$'
        update_group "dingtalk" "dingtalk-bin-amd64, dingtalk-bin-arm64" '^(dingtalk\-bin\-amd64|dingtalk\-bin\-arm64)$'
        update_group "claude-code" "claude-code-bin-arm64-linux, claude-code-bin-amd64-linux, claude-code-bin-arm64-darwin, claude-code-bin-amd64-darwin" '^(claude\-code\-bin\-arm64\-linux|claude\-code\-bin\-amd64\-linux|claude\-code\-bin\-arm64\-darwin|claude\-code\-bin\-amd64\-darwin)$'
        update_group "codex" "codex, codex-bin-amd64-linux, codex-bin-arm64-linux, codex-bin-amd64-darwin, codex-bin-arm64-darwin" '^(codex|codex\-bin\-amd64\-linux|codex\-bin\-arm64\-linux|codex\-bin\-amd64\-darwin|codex\-bin\-arm64\-darwin)$'
        update_group "kwok" "kwok" '^(kwok)$'
        update_group "vagrant-vmware-utility" "vagrant-vmware-utility" '^(vagrant\-vmware\-utility)$'
    - name: Update nix flake lock
      run: nix flake update
    - name: Update Go vendor hashes
      run: ./update-go-vendorHash.sh
    - name: Commit back to repository
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: 'auto: update packages'
