name: 'Auto update packages'
on:
  workflow_dispatch:
  schedule:
    # rebuild everyday at 5:55
    # TIP: Choose a random time here so not all repositories are build at once:
    # https://www.random.org/clock-times/?num=1&earliest=01%3A00&latest=08%3A00&interval=5&format=html&rnd=new
    - cron: '55 5 * * *'
jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: "nixpkgs=channel:nixos-unstable-small"
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - name: Update source groups
      id: update_sources
      run: |
        bash ./scripts/auto-update.sh
    - name: Update nix flake lock
      run: nix flake update
    - name: Update Go vendor hashes
      if: steps.update_sources.outputs.go_vendorhash_targets != ''
      env:
        GO_VENDORHASH_TARGETS: ${{ steps.update_sources.outputs.go_vendorhash_targets }}
      run: ./scripts/update-go-vendorHash.sh
    - name: Commit back to repository
      uses: stefanzweifel/git-auto-commit-action@v7
      with:
        commit_message: 'auto: update packages'
