#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
show_hidden = true
sort_by = "natural"
sort_translit = true
linemode = "size"

[preview]
image_delay = 0

[input]
cursor_blink = true

[plugin]
prepend_fetchers = [
  { group = "git", url = "*",  run = "git" },
  { group = "git", url = "*/", run = "git" }
]
