name: "Build and populate cache"
on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "45 11 * * *"
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
jobs:
  tests:
    strategy:
      matrix:
        nurRepo:
          - MCSeekeri
        nixPath:
          - nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixpkgs-unstable.tar.gz
          - nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-unstable.tar.gz
          - nixpkgs=https://github.com/NixOS/nixpkgs/archive/refs/heads/nixos-26.05.tar.gz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: wimpysworld/nothing-but-nix@main
        with:
          hatchet-protocol: 'carve'
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: "${{ matrix.nixPath }}"
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = https://nix.mcseekeri.com?priority=51
            extra-trusted-public-keys = nix.mcseekeri.com-1:3gd0/2u7IOF7YooxEiBbWTvRCYGC53S2UoqFdnCUYHc=
            build-dir = /nix/build
            max-jobs = 2
            max-substitution-jobs = 8
      - name: Setup niks3
        uses: Mic92/niks3-action@v1
        with:
          server-url: https://niks3.mcseekeri.com
          drain-timeout: 7200
      - name: Show nixpkgs version
        run: nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'
      - name: Check evaluation
        run: |
          nix-env -f . -qa \* --meta --xml \
            --allowed-uris https://static.rust-lang.org \
            --option restrict-eval true \
            --option allow-import-from-derivation true \
            --drv-path --show-trace \
            -I nixpkgs=$(nix-instantiate --find-file nixpkgs) \
            -I $PWD
      - name: Build nix packages
        shell: bash
        run: |
          heartbeat() {
            while sleep 5m; do
              echo "::notice::Nix build is still running at $(date --iso-8601=seconds)"
            done
          }

          heartbeat &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true; wait "$heartbeat_pid" 2>/dev/null || true' EXIT

          nix shell -f '<nixpkgs>' nix-build-uncached -c nix-build-uncached \
            --show-trace --option log-lines 0 \
            ci.nix -A cacheOutputs
      - name: Trigger NUR update
        run: curl -XPOST "https://nur-update.nix-community.org/update?repo=${{ matrix.nurRepo }}"
