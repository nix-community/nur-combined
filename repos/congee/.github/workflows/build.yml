name: "Build and populate cache"
on:
  # Branch pushes cover new branches, same-repo PR branches, and auto-update
  # branches pushed via NUR_DEPLOY_KEY. Avoid also running pull_request here
  # because that creates duplicate required checks.
  push:
    branches:
      - '**'
  schedule:
    # rebuild everyday at 2:51
    # TIP: Choose a random time here so not all repositories are build at once:
    # https://www.random.org/clock-times/?num=1&earliest=01%3A00&latest=08%3A00&interval=5&format=html&rnd=new
    - cron:  '51 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      matrix:
        # Set this to notify the global nur package registry that changes are
        # available.
        #
        # The repo name as used in
        # https://github.com/nix-community/NUR/blob/master/repos.json
        nurRepo:
          - Congee
        # Set this to cache your build results in cachix for faster builds
        # in CI and for everyone who uses your cache.
        #
        # Format: Your cachix cache host name without the ".cachix.org" suffix.
        # Example: mycache (for mycache.cachix.org)
        #
        # For this to work, you also need to set the CACHIX_SIGNING_KEY or
        # CACHIX_AUTH_TOKEN secret in your repository secrets settings in
        # Github found at
        # https://github.com/<your_githubname>/nur-packages/settings/secrets
        cachixName:
          - congee
        nixPath:
          - nixpkgs=channel:nixos-unstable
          # - nixpkgs=channel:nixos-unstable
          # - nixpkgs=channel:nixos-21.11
        # macos-latest is Apple Silicon (aarch64-darwin); free for public
        # repos and covers darwin-only packages like rapid-mlx
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
    - name: Install nix
      uses: cachix/install-nix-action@v31
      with:
        nix_path: "${{ matrix.nixPath }}"
        extra_nix_config: |
          experimental-features = nix-command flakes
          access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
    - name: Wait for nix daemon
      # On macos-latest the daemon-mode install races: the LaunchDaemon and
      # synthetic APFS volume aren't ready when the next step runs, so the nix
      # client falls back to direct-store access and dies with
      # "opening lock file /nix/var/nix/db/big-lock: Permission denied".
      # Poll until the daemon actually answers before proceeding.
      run: |
        for i in $(seq 1 30); do
          if nix store ping; then exit 0; fi
          echo "nix daemon not ready yet (attempt $i); retrying in 2s"
          sleep 2
        done
        echo "nix daemon never became ready" >&2
        exit 1
    - name: Show nixpkgs version
      run: nix-instantiate --eval -E '(import <nixpkgs> {}).lib.version'
    - name: Compute unfree push filter
      id: unfree
      # Evaluation only — unfree packages are never built here. ci.nix derives
      # the filter from meta.license, the single source of truth, so unfree
      # store paths can never reach the public cache even if a future step
      # builds them.
      env:
        NIXPKGS_ALLOW_UNFREE: 1
      run: |
        echo "filter=$(nix-instantiate --eval --strict --json ci.nix -A unfreePushFilter | jq -r .)" >> "$GITHUB_OUTPUT"
    - name: Setup cachix
      uses: cachix/cachix-action@v17
      # Don't replace <YOUR_CACHIX_NAME> here!
      if: ${{ matrix.cachixName != '<YOUR_CACHIX_NAME>' }}
      with:
        name: ${{ matrix.cachixName }}
        signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
        pushFilter: '${{ steps.unfree.outputs.filter }}'
    - name: Check evaluation
      run: |
        nix-env -f . -qa \* --meta --xml \
          --allowed-uris https://static.rust-lang.org \
          --option restrict-eval true \
          --option allow-import-from-derivation true \
          --drv-path --show-trace \
          -I "nixpkgs=$(nix-instantiate --find-file nixpkgs)" \
          -I "$PWD"
    - name: Build nix packages
      env:
        NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1  # for Darwin builds
      run: nix shell -f '<nixpkgs>' nix-build-uncached -c nix-build-uncached ci.nix -A cacheOutputs
    - name: Trigger NUR update
      # Don't replace <YOUR_REPO_NAME> here!
      # Only notify once per run, not once per OS
      if: ${{ matrix.nurRepo != '<YOUR_REPO_NAME>' && matrix.os == 'ubuntu-latest' }}
      run: curl -XPOST "https://nur-update.nix-community.org/update?repo=${{ matrix.nurRepo }}"
