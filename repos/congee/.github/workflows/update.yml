name: Update packages
on:
  schedule:
    - cron: '20 8 * * *' # Daily
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to update (leave empty for all)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-packages:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list.outputs.packages }}
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - id: list
        run: |
          packages=$(nix-instantiate --eval --json -E \
            'builtins.filter (n: !builtins.elem n ["lib" "modules" "overlays"]) (builtins.attrNames (import ./default.nix {}))')
          echo "packages=$packages" >> $GITHUB_OUTPUT

  update:
    needs: detect-packages
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.detect-packages.outputs.packages) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: ${{ !inputs.package || inputs.package == matrix.package }}
      - uses: cachix/install-nix-action@v31
        if: ${{ !inputs.package || inputs.package == matrix.package }}
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v17
        if: ${{ !inputs.package || inputs.package == matrix.package }}
        with:
          name: congee
          signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Configure git
        if: ${{ !inputs.package || inputs.package == matrix.package }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Update ${{ matrix.package }}
        if: ${{ !inputs.package || inputs.package == matrix.package }}
        run: |
          nix-shell -p nix-update --run "nix-update --commit ${{ matrix.package }}"
          if git diff --quiet origin/master HEAD; then
            echo "No update for ${{ matrix.package }}"
            exit 0
          fi

          # Fix any stale FOD hashes by building and extracting correct hashes
          pkg="${{ matrix.package }}"
          nix_file="pkgs/${pkg}/default.nix"
          if [[ -f "$nix_file" ]]; then
            .github/scripts/fix-fod-hashes.sh "$pkg" "$nix_file"
            if ! git diff --quiet -- "$nix_file"; then
              git add "$nix_file"
              git commit --amend --no-edit
            fi
          fi

          # Rewrite nix-update's "pkg: old -> new" to conventional commit style
          commit_msg=$(git log -1 --format=%s)
          git commit --amend -m "feat(pkgs): bump ${commit_msg}"
      - name: Create PR
        if: ${{ !inputs.package || inputs.package == matrix.package }}
        run: |
          pkg="${{ matrix.package }}"
          if git diff --quiet origin/master HEAD; then
            echo "No update for $pkg"
            exit 0
          fi
          title=$(git log -1 --format=%s)
          branch="auto-update/${pkg}"
          git checkout -b "$branch"
          git push -u origin "$branch" --force-with-lease
          gh pr create \
            --title "$title" \
            --body "Automated update by nix-update." \
            --base master \
            --head "$branch" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
